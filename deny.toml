# cargo-deny configuration for the rust-graph-algorithms workspace.
# See https://embarkstudios.github.io/cargo-deny/ for the schema.

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
# Allowed unmaintained-crate warnings — both arrive transitively
# through aprender-graph's parquet/aprender-core dependency chain
# and have no actively maintained replacement in that chain yet.
# Re-evaluate on every aprender-graph version bump.
ignore = [
    "RUSTSEC-2024-0436", # paste 1.0.15 — no longer maintained, no available replacement
    "RUSTSEC-2025-0141", # bincode 1.3.3 — unmaintained, aprender-core dep
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
